<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5.0" />
    <meta name="theme-color" content="#15803d" />
    <meta name="description" content="Find the cheapest available public EV charger near you." />
    <title>Charging — cheapest EV charger nearby</title>
    <!-- Apply the saved theme before first paint, to avoid a light flash. -->
    <script>
      try {
        var t = localStorage.getItem('charging.theme') || 'system'
        var dark = t === 'dark' || (t === 'system' && matchMedia('(prefers-color-scheme: dark)').matches)
        document.documentElement.dataset.theme = dark ? 'dark' : 'light'
        if (dark) document.querySelector('meta[name="theme-color"]').setAttribute('content', '#0b1220')
      } catch (e) {}
    </script>
    <!-- Runtime config, generated from env at container startup (envsubst). -->
    <script src="/config.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

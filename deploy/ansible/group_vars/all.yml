# Non-secret deployment vars. Secrets are in group_vars/charging/vault.yml
# (encrypted with ansible-vault) — see vault.yml.example for the full list.
---
charging_repo: "git@github.com:jeroentrappers/charging.git"
charging_branch: master
charging_dir: /opt/charging

# Public hostname this box answers on. Cut over to production 2026-06-12.
charging_domain: charging.appmire.be
certbot_email: jeroen.trappers@secutec.com
enable_tls: true

# How the working tree gets onto the box:
#   rsync  – push the local checkout (no GitHub creds needed on the box)
#   git    – clone/pull {{ charging_repo }} (needs a deploy key on the box)
deploy_mode: rsync

# How secrets land on the box:
#   vault  – render .env + certs from group_vars/charging/vault.yml
#   copy   – upload deploy/ansible/files/{env,mob-cert.pem,mob-key.pem} (gitignored)
secrets_mode: vault

# This Hetzner box is amd64, so the official PostGIS image works (appmire4-web
# is arm64 and needs the imresamu mirror). Ports stay on loopback — nginx is
# the only public entry, same as appmire4-web.
db_image: "postgis/postgis:17-3.5"
api_loopback_port: 8081
web_loopback_port: 5173
compose_files:
  - docker-compose.prod.yml
  - docker-compose.osrm.yml
  - docker-compose.hetz1.yml   # rendered by the charging role (host override)

# OSRM routing extract. Belgium-only today (matches appmire4-web); bump to a
# merged BENELUX+DE+FR extract here later — this box has the headroom.
osrm_region_name: belgium-latest
osrm_region_url: https://download.geofabrik.de/europe/belgium-latest.osm.pbf

# Firewall: ufw is the single firewall. SSH stays restricted to source IPs.
# ssh_allow_ips = permanent static allow-list (the safety net, never auto-pruned).
ssh_allow_ips:
  - 87.66.4.201      # primary admin / control node

# Dynamic allow-list: a timer resolves this host and maintains comment-tagged
# ufw SSH rules for it (ported from the box's old nftables ssh_dyndns updater).
ssh_dyndns_host: hq.appmire.be

# Base box setup: packages, Docker Engine + compose plugin, firewall. Written to
# be safe on a shared host (only opens ports, installs idempotently).
---
- name: Install base packages
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - git
      - rsync
      - ufw
      - osmium-tool
      - python3
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Add Docker apt key
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/debian/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"

- name: Detect dpkg architecture
  ansible.builtin.command: dpkg --print-architecture
  register: dpkg_arch
  changed_when: false

- name: Add Docker apt repo
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch={{ dpkg_arch.stdout }} signed-by=/etc/apt/keyrings/docker.asc]
      https://download.docker.com/linux/debian
      {{ ansible_distribution_release }} stable
    filename: docker
    state: present

- name: Install Docker Engine + compose plugin
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: true

- name: Configure Docker DNS (host uses systemd-resolved 127.0.0.53, unusable in containers)
  ansible.builtin.copy:
    dest: /etc/docker/daemon.json
    mode: "0644"
    content: |
      {
        "dns": ["185.12.64.1", "185.12.64.2", "1.1.1.1"]
      }
  register: docker_daemon_cfg

- name: Enable + start docker
  ansible.builtin.systemd:
    name: docker
    enabled: true
    state: started

- name: Restart docker if daemon config changed
  ansible.builtin.systemd:
    name: docker
    state: restarted
  when: docker_daemon_cfg is changed

# --- Firewall: ufw is the single firewall. Migrate the box's nftables
#     allow-list into ufw, then retire nftables so they don't compete. ------
- name: ufw — default deny incoming
  community.general.ufw: { direction: incoming, policy: deny }

- name: ufw — default allow outgoing
  community.general.ufw: { direction: outgoing, policy: allow }

# ufw defaults the FORWARD chain to DROP, blocking Docker container egress.
# Allow routed traffic; Docker's DOCKER-USER chain still governs exposure.
- name: ufw — allow routed traffic (Docker container egress)
  community.general.ufw: { direction: routed, policy: allow }

- name: ufw — SSH restricted to the allow-list (migrated from nftables)
  community.general.ufw:
    rule: allow
    from_ip: "{{ item }}"
    to_port: "{{ ansible_port | default(22) }}"
    proto: tcp
  loop: "{{ ssh_allow_ips }}"

# Guard: never leave SSH world-open. Remove any blanket "allow <port>/tcp from
# anywhere" rule — SSH must only ever be reachable from the allow-list + dyndns.
- name: ufw — ensure SSH is NOT open to the world
  community.general.ufw:
    rule: allow
    port: "{{ ansible_port | default(22) }}"
    proto: tcp
    delete: true

- name: ufw — public web (HTTP/HTTPS, v4+v6)
  community.general.ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop: ["80", "443"]

- name: ufw — enable
  community.general.ufw: { state: enabled }

- name: ufw — capture status
  ansible.builtin.command: ufw status
  register: ufw_status
  changed_when: false

# SAFETY GATE: never retire nftables unless ufw is active AND already permits
# SSH from the primary admin IP — otherwise we'd lock ourselves out.
- name: ufw — assert SSH allow-list is live before retiring nftables
  ansible.builtin.assert:
    that:
      - "'Status: active' in ufw_status.stdout"
      - "ssh_allow_ips[0] in ufw_status.stdout"
      - "'22' in ufw_status.stdout"
    fail_msg: "ufw not safely configured for SSH; refusing to retire nftables"

# Retire the competing nftables firewall. Its ExecStop is `nft flush ruleset`,
# which would wipe ufw + Docker tables too — neutralize that first, then delete
# only its inet filter table (the input/forward DROP that blocks us).
- name: nftables — systemd drop-in dir
  ansible.builtin.file:
    path: /etc/systemd/system/nftables.service.d
    state: directory
    mode: "0755"

- name: nftables — neutralize flush-on-stop
  ansible.builtin.copy:
    dest: /etc/systemd/system/nftables.service.d/override.conf
    mode: "0644"
    content: |
      [Service]
      ExecStop=
      ExecStop=/bin/true
  register: nft_override

- name: nftables — reload systemd if override changed
  ansible.builtin.systemd: { daemon_reload: true }
  when: nft_override is changed

- name: nftables — delete the input/forward-DROP table (ufw now owns filtering)
  ansible.builtin.shell: |
    if nft list table inet filter >/dev/null 2>&1; then nft delete table inet filter; echo removed; fi
  register: nft_del
  changed_when: "'removed' in nft_del.stdout"

- name: nftables — stop, disable, mask the service
  ansible.builtin.systemd:
    name: nftables
    state: stopped
    enabled: false
    masked: true

# Dynamic SSH allow-list: ported from the box's old nftables ssh_dyndns updater
# to ufw. A timer resolves {{ ssh_dyndns_host }} and maintains comment-tagged
# ufw allow rules for it (static rules in ssh_allow_ips are never touched).
- name: dyndns — install ufw updater script
  ansible.builtin.copy:
    src: update-ssh-dyndns.sh
    dest: /usr/local/sbin/update-ssh-dyndns.sh
    mode: "0755"

- name: dyndns — install systemd service
  ansible.builtin.template:
    src: update-ssh-dyndns.service.j2
    dest: /etc/systemd/system/update-ssh-dyndns.service
    mode: "0644"
  register: dyndns_service

- name: dyndns — install systemd timer
  ansible.builtin.copy:
    src: update-ssh-dyndns.timer
    dest: /etc/systemd/system/update-ssh-dyndns.timer
    mode: "0644"
  register: dyndns_timer

- name: dyndns — reload systemd if units changed
  ansible.builtin.systemd: { daemon_reload: true }
  when: dyndns_service is changed or dyndns_timer is changed

- name: dyndns — enable + start the timer
  ansible.builtin.systemd:
    name: update-ssh-dyndns.timer
    enabled: true
    state: started

- name: dyndns — run once now to apply current IP(s)
  ansible.builtin.command: /usr/local/sbin/update-ssh-dyndns.sh {{ ssh_dyndns_host }}
  register: dyndns_run
  changed_when: "'->' in dyndns_run.stdout"

# --- deploy user can drive docker + owns the deploy dir ------------------
- name: Add deploy user to the docker group
  ansible.builtin.user:
    name: "{{ ansible_user }}"
    groups: docker
    append: true
  register: docker_group

- name: Own the deploy dir (so unprivileged rsync/render works)
  ansible.builtin.file:
    path: "{{ charging_dir }}"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0755"

- name: Refresh connection so docker-group membership takes effect
  ansible.builtin.meta: reset_connection
  when: docker_group is changed

# Base box setup: packages, Docker Engine + compose plugin, firewall. Written to
# be safe on a shared host (only opens ports, installs idempotently).
---
- name: Install base packages
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - git
      - rsync
      - ufw
      - python3
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Add Docker apt key
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/debian/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"

- name: Detect dpkg architecture
  ansible.builtin.command: dpkg --print-architecture
  register: dpkg_arch
  changed_when: false

- name: Add Docker apt repo
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch={{ dpkg_arch.stdout }} signed-by=/etc/apt/keyrings/docker.asc]
      https://download.docker.com/linux/debian
      {{ ansible_distribution_release }} stable
    filename: docker
    state: present

- name: Install Docker Engine + compose plugin
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: true

- name: Enable + start docker
  ansible.builtin.systemd:
    name: docker
    enabled: true
    state: started

- name: Firewall — allow SSH, HTTP, HTTPS
  community.general.ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop: ["{{ ansible_port | default(22) }}", "80", "443"]

- name: Firewall — default deny incoming, enable
  community.general.ufw:
    state: enabled
    direction: incoming
    policy: deny

# --- deploy user can drive docker + owns the deploy dir ------------------
- name: Add deploy user to the docker group
  ansible.builtin.user:
    name: "{{ ansible_user }}"
    groups: docker
    append: true
  register: docker_group

- name: Own the deploy dir (so unprivileged rsync/render works)
  ansible.builtin.file:
    path: "{{ charging_dir }}"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0755"

- name: Refresh connection so docker-group membership takes effect
  ansible.builtin.meta: reset_connection
  when: docker_group is changed

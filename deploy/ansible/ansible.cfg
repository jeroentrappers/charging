[defaults]
inventory = inventory.ini
roles_path = roles
host_key_checking = False
stdout_callback = default
result_format = yaml
retry_files_enabled = False
# Secrets live in group_vars/charging/vault.yml (ansible-vault). Point at a
# password file so plays run non-interactively (keep it out of git).
vault_password_file = .vault-pass

[ssh_connection]
pipelining = True

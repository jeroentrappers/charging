# Production stack for a single VM. Tokens live in .env (see .env.example).
#   docker compose -f docker-compose.prod.yml up -d --build
x-app: &app
  build: .
  image: charging:latest
  env_file: .env
  environment:
    # Overrides the dev DATABASE_URL from .env to point at the compose DB.
    DATABASE_URL: postgres://charging:charging@db:5432/charging?sslmode=disable
  restart: unless-stopped

services:
  db:
    image: postgis/postgis:17-3.5
    environment:
      POSTGRES_USER: charging
      POSTGRES_PASSWORD: charging
      POSTGRES_DB: charging
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U charging -d charging"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  migrate:
    <<: *app
    command: ["/usr/local/bin/migrate"]
    restart: "no"
    depends_on:
      db:
        condition: service_healthy

  # Optional demo data (idempotent). Only runs with the "demo" profile:
  #   make prod-demo   (or: docker compose ... --profile demo up)
  demo-seed:
    image: postgis/postgis:17-3.5
    profiles: ["demo"]
    environment:
      PGPASSWORD: charging
    entrypoint: ["sh", "-c", "psql -h db -U charging -d charging -v ON_ERROR_STOP=1 -f /seed.sql"]
    volumes:
      - ./db/demo_seed.sql:/seed.sql:ro
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: "no"

  api:
    <<: *app
    command: ["/usr/local/bin/api"]
    ports:
      - "8080:8080"
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "/usr/local/bin/api", "-healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3

  ingest:
    <<: *app
    command: ["/usr/local/bin/ingest"]
    environment:
      DATABASE_URL: postgres://charging:charging@db:5432/charging?sslmode=disable
      METRICS_ADDR: ":9090"
    depends_on:
      migrate:
        condition: service_completed_successfully

  # PWA served by nginx. VITE_API_BASE is injected at *runtime* (envsubst into
  # /config.js on startup) — must be the API origin the *browser* can reach (the
  # published api port, not the compose network name). Set WEB_API_BASE per env.
  web:
    build:
      context: ./web
    image: charging-web:latest
    environment:
      VITE_API_BASE: ${WEB_API_BASE:-http://localhost:8080}
    ports:
      - "5173:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pgdata:
